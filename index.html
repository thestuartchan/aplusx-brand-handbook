rsonality:[["Direct","We explain things plainly. We do not hide behind technical jargon."],["Confident","We know what works. We do not apologize for our point of view."],["Friendly","We talk with users, not at them."],["Fast","We move quickly \u2014 in product, in content, in market response."],["Grounded","We earn our authority from results and craft, not from posture."]],tone:{sound:"A trusted equipment expert who has been in the game a long time, talks to gamers as peers, and does not waste their time. Conversational but informed. Plain but precise. Confident but never arrogant. Specific over abstract.",never:["A 'gaming' brand performing gaming aesthetics","A spec sheet reading itself aloud","An influencer's enthusiasm","A premium or boutique brand","eS (silent, distant, expert-to-expert)"]},pillars:[{head:"Shape is King",body:"Pulsar's range exists because gamers' hands and styles do not fit one template. This pillar carries every story about form factor variety, grip-type fit, and why we ship multiple shapes in the same series.",topics:["Why we ship the X2H, X2V, and X2 Mini \u2014 three shapes for three grips","How to choose between fingertip, palm, and claw","Inside the X-series geometry: why the curve at the back matters"]},{head:"Made by the same hands that build for pros",body:"Pulsar's credibility comes from AplusX's R&D and manufacturing depth \u2014 the same engineering base that ships Pulsar eS to professional players.",topics:["The sensor lineage \u2014 what Pulsar shares with the pro reference platform","QC walk-through \u2014 how every Pulsar mouse is verified","Heritage feature \u2014 the R&D base behind both Pulsar and eS"]},{head:"Performance you can feel",body:"The differences Pulsar champions are felt in the hand, in the input, in the result on screen \u2014 not measured on a spec sheet.",topics:["Feel-test \u2014 what changes when you swap a 60g mouse for an 80g one","Grip versus shape versus weight \u2014 what matters most for your style","Switch feel comparisons \u2014 beyond the spec"]},{head:"Always the next, always on time",body:"Pulsar leads the mass market by cadence and rhythm \u2014 not by being first to invent, but by being first to ship at scale.",topics:["What is coming this quarter \u2014 the cadence brief","Variant launch \u2014 color, weight, switch swap","Software update \u2014 what changed in the latest firmware"]}],restrictions:["Never claims to be the best \u2014 Pulsar is the default, not the peak","Never adopts eS's silent register \u2014 Pulsar explains","Never leads with specifications \u2014 Pulsar leads with what they enable","Never speaks down to mass audiences \u2014 translation, not condescension","Never copies the visual language of generic gaming brands"],crossBrandRules:[`Pulsar may reference Pulsar eS as proof of pro-grade credibility \u2014 always as a separate tier, never as "Pulsar's upper line"`,"Pulsar may repost from the eS chain \u2014 PRO Series, Signature, and partnered-player content \u2014 selectively, reframed in Pulsar's voice","Pulsar may reference Superglide accessories as compatible add-ons but does not act as Superglide's parent","Pulsar may credit Pulsar LAB for experimental research translated into a Pulsar product, but does not market LAB outputs themselves","Pulsar does not reference Feinmann publicly \u2014 the audiences do not overlap"],contentMix:[{label:"Education",desc:"gear explainers, fit guides, software walk-throughs",pct:40,color:"#0080FF"},{label:"Product",desc:"launches, restocks, variant reveals, retail availability",pct:25,color:"#5BB1F7"},{label:"Community",desc:"user setups, feedback response, partner creators",pct:20,color:"#7DC4F8"},{label:"Culture",desc:"esports moments, gaming community context",pct:15,color:"#9FD6F9"}]},"pulsar-es":{key:"pulsar-es",name:"pulsar eS",label:"Pulsar eS",color:t.pulsarEs,role:"Absolute pro standard",oneLiner:"Built for the moments that matter.",essence:"The absolute standard of esports equipment for professionals. Pulsar eS is not gaming gear \u2014 it is the reference. Not designed to be enjoyable, designed to avoid mistakes at the highest level of competition. eS does not explain itself; it is proven through use, tournament results, and the professional usage rate.",positioning:"For professional players and the technical core of the competitive community, Pulsar eS is the equipment standard that does not fail at the most critical moments \u2014 proven through tournament use, professional usage rates, and uncompromising quality control, not through advertising.",voiceSig:[["Manifesto","eS doesn't sell. eS is chosen."],["Voice","Silent. Serious. Authoritative."],["Tagline","Standard is King."]],audience:{primary:"Professional esports players and the technical core of the player community \u2014 coaches, analysts, hardware-aware streamers, and competitive players who treat equipment as performance-critical infrastructure.",secondary:"Tournament organizers, team management, hardware press whose reviews influence professional and core community.",notFor:"Mass-market gamers (Pulsar's audience), aesthetic-driven buyers, beginners, anyone for whom price is the determining variable."},personality:[["Restrained","eS does not chase attention."],["Precise","eS speaks in specifics, never in claims."],["Unhurried","eS releases when ready, not when scheduled."],["Confident","eS does not need to convince anyone. The position is earned in competition."]],tone:{sound:"A technical reference document. Specifications stated precisely, without adjectives. Tournament results documented, not celebrated. Product reveals are minimal, often launched alongside a tournament moment in which the product is already being used.",never:["A mass-market consumer brand","A hype account \u2014 no countdowns, no teaser series",'A lifestyle brand \u2014 no "lifestyle" settings',"An influencer-led brand","Pulsar \u2014 eS is not chatty, it does not translate"]},pillars:[{head:"The reference standard",body:"eS is the equipment used at the highest level. The pillar carries proof points \u2014 usage rates, tournament context, professional adoption.",topics:["Tournament usage data \u2014 which eS products were on the table at the major","Professional usage rate \u2014 the number, by category, by region","Why eS is the reference and not the alternative"]},{head:"Proven, not claimed",body:"Every eS communication points to verifiable use. Specifications are stated precisely, results are documented, and claims are never made.",topics:["QC process \u2014 what 'meeting the eS standard' actually means","Tournament outcome \u2014 documenting the use, not the marketing","Specification reveal \u2014 at readiness, no countdown"]},{head:"The player is the standard (PRO Series)",body:"PRO Series is the humanization layer of eS. Each product is built around a specific pro player. The pillar carries player documentation and the connection between the player and the product.",topics:["Documentary feature on a PRO Series player \u2014 hand, grip, play style","The build process \u2014 how eS develops a PRO Series product with a specific player","Why this product was built for this player"]}],restrictions:["Never markets \u2014 eS does not run launches, countdowns, or hype cycles","Never operates a 'lifestyle' content stream","Never claims to be 'better than' \u2014 eS is the reference","Never engages with mass-market consumer language","Never participates in non-competitive collabs or pop-culture IP"],crossBrandRules:["Pulsar eS does not reference Pulsar in consumer-facing communications","Pulsar eS does not reference Superglide products as tournament accessories","Pulsar eS does not reference Feinmann","Pulsar eS may credit Pulsar LAB when LAB research has been incorporated into an eS product \u2014 selectively, with restrained voice","Pulsar eS does not participate in AplusX-level corporate messaging that would soften its standalone authority"],contentMix:[{label:"Proof",desc:"tournament use, professional usage data, win moments",pct:60,color:"#C62828"},{label:"Product",desc:"at readiness only; deeply specific reveals, no hype",pct:30,color:"#D85959"},{label:"Institutional",desc:"partnership and tournament announcements",pct:10,color:"#E48989"}]},feinmann:{key:"feinmann",name:"feinmann",label:"Feinmann",color:t.feinmann,role:"Authority / luxury",oneLiner:"Refined, to the touch.",essence:"The world's first luxury input device brand, created exclusively for the top 1%. Feinmann does not exist to sell in large volumes \u2014 scarcity is intentional strategy. Small-batch, atelier-made in Korea and Japan. The input device as a luxury object, not an electronic product.",positioning:"For the top 1% who furnish their environments with objects of authority, Feinmann is the world's first luxury input device \u2014 a Korean and Japanese atelier-made object that signals taste rather than performance, in a category that has never before existed at this tier.",voiceSig:[["Manifesto","Feinmann never explains itself fully."],["Voice","Quiet. Refined. Calm. Almost intimidating."],["Posture","Authority over accessibility."]],audience:{primary:"The global top 1% \u2014 executives, principals, founders, sovereign and institutional figures, high-net-worth individuals who furnish their environments with objects of taste and authority. Not bound by industry or by gaming.",secondary:"Connoisseur collectors of fine objects, design-led architects and interior specifiers, luxury retail and concierge platforms.",notFor:"Gamers as an identity. Performance-first audiences. Anyone for whom price is a consideration in the buying decision."},personality:[["Discreet","Feinmann does not perform luxury."],["Confident","Feinmann does not justify its price."],["Patient","Feinmann does not chase moments."],["Authoritative","Feinmann assumes the audience recognizes what it is looking at."],["Crafted","Rooted in the hand of the maker, not the algorithm of the market."]],tone:{sound:"A design publication's editorial. Calm, considered, complete. Sentences are short and intentional. Materials are named precisely. Numbers are minimized. The voice does not perform luxury \u2014 it assumes it.",never:["A consumer brand making a luxury claim","A tech product describing its specs","A gaming brand at any volume","A status-signaling brand performing exclusivity","An influencer endorsement"]},pillars:[{head:"Authority as object",body:"Feinmann products are objects first, input devices second. Their value is measured in tactile feel, weight, balance, proportion, completeness of detail.",topics:["The object on the desk \u2014 composition, light, proportion","Weight, balance, and the language of the hand","Why the object precedes the function"]},{head:"Atelier method",body:"Small-batch production in Korea and Japan, close to handcraftsmanship. Materials, finishing, precision \u2014 the artisanal premise is the brand.",topics:["Inside the atelier \u2014 the people, the tools, the slowness","Material study \u2014 the steel, the wood, the leather, the finish","Why small-batch is the model and scale is not the goal"]},{head:"A new category at the table",body:"Feinmann is creating a category \u2014 the luxury input device \u2014 that has not existed before. Pillar covers cultural placement, peer-tier collaboration.",topics:["Why the input device belongs at the luxury tier","Peer-tier collaboration \u2014 Feinmann \xD7 heritage maker","Placement \u2014 the product in the environment of authority"]}],restrictions:["Never appears at gaming venues, trade shows, or media","Never performs luxury \u2014 no theatrics, no superlatives","Never collaborates with mass IPs, streetwear, or celebrity endorsements","Never compresses price \u2014 discounts and promotions do not exist","Never references gaming peripherals as a category in its own copy"],crossBrandRules:["Feinmann does not publicly reference Pulsar, Pulsar eS, Superglide, or Pulsar LAB","Feinmann's corporate parent (AplusX) is acknowledged only in regulatory or institutional contexts where required","Feinmann does not share retail, trade show, or editorial venues with the gaming portfolio","Feinmann's manufacturing relationship with AplusX is disclosed in technical contexts but is not part of the consumer story"],contentMix:[{label:"Object",desc:"high-craft photography in considered environments",pct:60,color:"#1B5E20"},{label:"Process",desc:"atelier work, materials, the people behind the craft",pct:25,color:"#4D8550"},{label:"Customer/place",desc:"collector features, environments, editorial",pct:15,color:"#82AB85"}]},superglide:{key:"superglide",name:"superglide",label:"Superglide",color:t.superglide,role:"Accessories & culture",oneLiner:"Glides. Grips. Drops.",essence:"An independent accessories brand that treats input device accessories as core elements of play feel, not consumables. Works across all mice and all brands. The portfolio's accessories engine \u2014 designed to operate fastest, most freely, and most collaboratively in the market. Fully independent from Q3 2026.",positioning:"For setup-driven players and mass-market consumers, Superglide is the independent accessories brand that changes how a setup feels and how a desk looks \u2014 designed across every input device and every brand, fluent in trend, and the first accessories brand built for the retail aisle.",voiceSig:[["Manifesto","Create desire before explanations."],["Voice","Energetic. Expressive. Trend-aware."],["Posture","Speed and trend engine."]],audience:{primary:"Light users and general consumers entering the accessories category through retail, gift, and discovery channels. Setup-driven buyers who shop on aesthetic and feel.",secondary:"Existing enthusiasts, core community members, professional players who define what is hip and cool. Creators, designers, culture-adjacent buyers.",notFor:"Hardware purists who reject accessories as a category \u2014 a small population. Superglide is positioned for everyone else."},personality:[["Visual","Superglide is seen before it is read."],["Culture-fluent","Superglide reads the room and reacts in days."],["Generous","Superglide is a platform for artists, IPs, and other brands."],["Design-led","Color and pattern are not afterthoughts. They are the product."],["Accessible","Mass-friendly, but not generic."]],tone:{sound:"A design-led culture brand. Confident, current, visually fluent. Captions are short and punchy. Drop announcements name the collab and let the design speak.",never:["A hardware brand specifying performance","A tutorial channel \u2014 accessories are not features, they are feel","A brand asking permission","A subsidiary of Pulsar \u2014 Superglide is independent","Generic \u2014 Superglide stops launching when it stops being distinctive"]},pillars:[{head:"Feel the difference, see the difference",body:"Superglide products change how a setup feels (glide, grip, tactile) and how it looks (color, texture, statement).",topics:["The feel-test \u2014 glass skates versus PTFE","The visual moment \u2014 color, finish, statement on the desk","Why this skate feels different \u2014 the material story"]},{head:"The drop that changes the desk",body:"Superglide operates on a drop cadence \u2014 collabs, limited editions, artist features.",topics:["Superglide \xD7 [Artist/Brand] \u2014 the collab story","Drop calendar \u2014 what is coming, what is rare","The drop that sold out \u2014 community reactions"]},{head:"Setup is culture",body:"Superglide treats the desk as a cultural surface. Pillar covers setup as expression, the broader culture of personalization.",topics:["Setup-of-the-week \u2014 user showcase","Trend report \u2014 what setup culture is doing now","The shift \u2014 from gear to setup, why now"]}],restrictions:["Never frames itself as a Pulsar sub-brand or accessories afterthought","Never claims tournament-grade competitive proof \u2014 that is eS's posture","Never stays silent \u2014 stagnation kills Superglid esting R&D ahead of mainstream releases.",notFor:"Mass-market buyers seeking the polished, supported, warranty-backed experience of Pulsar. Professional players seeking the proven, tournament-ready standard of Pulsar eS."},personality:[["Curious","LAB is interested before it is conclusive."],["Honest","LAB tells the audience exactly what stage a project is at."],["Permissive","LAB allows itself to be incomplete, inconsistent, occasionally wrong."],["Generative","LAB exists to produce ideas, not to optimize them."],["Transparent","LAB documents process, not just outcome."]],tone:{sound:"A research notebook with a sense of design. The voice is curious, candid, and lightly informal. We say 'we are trying' and 'we don't yet know,' and we treat that openness as a feature.",never:["A polished consumer brand \u2014 no 'this changes everything'","A spec-led hardware reveal","eS \u2014 LAB has voice in abundance, eS has restraint","A discount tier \u2014 LAB is experimental, not cheap","A community-led brand pretending LAB is the audience's"]},pillars:[{head:"Worth trying",body:"The standard for LAB is not 'ready to ship,' it is 'worth trying.' Pillar carries the experiments \u2014 products, concepts, materials, partnerships that earn their place by asking a question.",topics:["What we are trying this quarter \u2014 the LAB brief","Concept reveal \u2014 the question being asked","Field note \u2014 what we learned, what we didn't"]},{head:"Process is the product",body:"LAB shares its work in progress. The pillar carries documentation of materials, prototypes, R&D narratives.",topics:["Behind-the-design \u2014 materials and prototypes","R&D narrative \u2014 why this approach, what alternatives we considered","The build log \u2014 what changed, what stayed"]},{head:"From LAB to product",body:"Some LAB ideas graduate to Pulsar, eS, or Feinmann. The pillar carries the case-study format \u2014 the experiment that became something, and the experiments that did not.",topics:["From L
